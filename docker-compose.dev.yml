services:
  postgres-dev:
    image: postgres:15-alpine
    container_name: prepodavai-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: prepodavai
      POSTGRES_PASSWORD: prepodavai_dev
      POSTGRES_DB: prepodavai
    ports:
      - "5434:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prepodavai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis-dev:
    image: redis:7-alpine
    container_name: prepodavai-redis-dev
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_dev_data:
  redis_dev_data:
