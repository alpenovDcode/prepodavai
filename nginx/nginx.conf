events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Gzip Settings
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types 
        text/plain 
        text/css 
        application/json 
        application/javascript 
        text/javascript 
        text/xml 
        application/xml 
        application/xml+rss 
        image/svg+xml 
        application/x-font-ttf 
        font/opentype 
        font/otf 
        font/woff 
        font/woff2;

    # Include upstream configuration written by deploy.sh
    include /etc/nginx/conf.d/upstream.conf;
    
    # Allow large video uploads
    client_max_body_size 2G;
    client_body_timeout 60s;
    send_timeout 60s;

    # Frontend Server
    server {
        listen 3000;
        client_max_body_size 2G;

        # Caching for Next.js static assets
        location /_next/static/ {
            proxy_pass http://frontend_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 365d;
            access_log off;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Caching for other static public assets
        location /static/ {
            proxy_pass http://frontend_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 30d;
            access_log off;
            add_header Cache-Control "public, max-age=2592000";
        }

        location / {
            proxy_pass http://frontend_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Next.js optimization: disable buffering for streaming (if used)
            # proxy_buffering off;
        }
    }

    # API / Backend Server
    server {
        listen 3001;
        client_max_body_size 2G;

        location / {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            
            # Disable buffering for large uploads
            proxy_request_buffering off;
            proxy_buffering off;
        }
    }
}
