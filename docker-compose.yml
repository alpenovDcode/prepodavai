services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: prepodavai-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prepodavai-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis
  redis:
    image: redis:7-alpine
    container_name: prepodavai-redis-prod
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prepodavai-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Backend Defaults
  x-backend-defaults: &backend-defaults
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=4096"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      SMSC_LOGIN: ${SMSC_LOGIN}
      SMSC_PASSWORD: ${SMSC_PASSWORD}
      SMSC_SENDER: ${SMSC_SENDER:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-prrv_prepodavAI_bot}
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN}
      MAX_BOT_USERNAME: ${MAX_BOT_USERNAME}
      MAX_BOT_ID: ${MAX_BOT_ID:-id9714075294_bot}
      MAX_API_URL: ${MAX_API_URL:-https://platform-api.max.ru}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GAMMA_API_KEY: ${GAMMA_API_KEY:-}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN}
      ADMIN_USER_IDS: ${ADMIN_USER_IDS}
      BASE_URL: ${BASE_URL:-https://api.prepodavai.ru}
      CONTENT_BASE_URL: ${CONTENT_BASE_URL:-https://content.prepodavai.ru}
      # Replicate API
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN}
      # Polza.ai API
      POLZA_AI_API_KEY: ${POLZA_AI_API_KEY}
      # AssemblyAI API
      ASSEMBLYAI_API_KEY: ${ASSEMBLYAI_API_KEY}
      # SMTP Configuration
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://prepodavai.ru}
      # CloudPayments
      CLOUDPAYMENTS_PUBLIC_ID: ${CLOUDPAYMENTS_PUBLIC_ID}
      CLOUDPAYMENTS_API_SECRET: ${CLOUDPAYMENTS_API_SECRET}
      # Откуда Подписки (tgtrack) — аналитика MAX бота
      TGTRACK_MAX_API_KEY: ${TGTRACK_MAX_API_KEY:-}
      TGTRACK_MAX_BASE_URL: ${TGTRACK_MAX_BASE_URL:-https://max.tgtrack.ru/v1}
      # MAX канал для проверки подписки
      MAX_CHANNEL_ID: ${MAX_CHANNEL_ID:-}
      MAX_INTRO_VIDEO_TOKEN: ${MAX_INTRO_VIDEO_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - prepodavai-network
    security_opt:
      - seccomp:unconfined
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 5G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend-blue:
    <<: *backend-defaults
    container_name: prepodavai-backend-blue-prod

  backend-green:
    <<: *backend-defaults
    container_name: prepodavai-backend-green-prod

  # Worker для фоновых задач
  worker:
    build:
      context: .
      dockerfile: ./worker/Dockerfile
    container_name: prepodavai-worker-prod
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN}
      MAX_API_URL: ${MAX_API_URL:-https://platform-api.max.ru}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GAMMA_API_KEY: ${GAMMA_API_KEY:-}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      POLZA_AI_API_KEY: ${POLZA_AI_API_KEY}
      ASSEMBLYAI_API_KEY: ${ASSEMBLYAI_API_KEY}
      TELEGRAM_PROXY: ${TELEGRAM_PROXY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - prepodavai-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Telegram Bot
  telegram-bot:
    build:
      context: .
      dockerfile: ./telegram-bot/Dockerfile
    container_name: prepodavai-telegram-bot-prod
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      API_URL: http://nginx:3001
      SMSC_LOGIN: ${SMSC_LOGIN}
      SMSC_PASSWORD: ${SMSC_PASSWORD}
      SMSC_SENDER: ${SMSC_SENDER:-}
      WEBAPP_URL: ${NEXT_PUBLIC_APP_URL:-https://prepodavai.ru}
      # Egress к api.telegram.org через внешний прокси (РКН блокирует прямой IPv4-путь).
      # Формат: http://USER:PASS@HOST:PORT. Значение берётся из .env (не коммитим креды).
      TELEGRAM_PROXY: ${TELEGRAM_PROXY:-}
      DISABLE_FORCE_IPV4: "1"
      # Откуда Подписки (tgtrack) — аналитика Telegram бота
      TGTRACK_API_KEY: ${TGTRACK_API_KEY:-}
      # Telegram канал для проверки подписки
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID:-}
      TELEGRAM_CHANNEL_URL: ${TELEGRAM_CHANNEL_URL:-https://t.me/esvasilevaru}
      TELEGRAM_INTRO_VIDEO_ID: ${TELEGRAM_INTRO_VIDEO_ID:-}
      # Прорыв-LMS — режим «наблюдатель». На каждый Telegram-update параллельно
      # шлём POST в LMS, чтобы там копились подписчики/теги/UTM и работал
      # Bitrix24-синк. LMS не отвечает в Telegram, чтобы не дублировать.
      # Если переменные пусты — middleware просто не подключается.
      LMS_WEBHOOK_URL: ${LMS_WEBHOOK_URL:-}
      LMS_WEBHOOK_SECRET: ${LMS_WEBHOOK_SECRET:-}
      LMS_FORWARD_TIMEOUT_MS: ${LMS_FORWARD_TIMEOUT_MS:-3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - prepodavai-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend Defaults
  x-frontend-defaults: &frontend-defaults
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_TELEGRAM_BOT_NAME: ${NEXT_PUBLIC_TELEGRAM_BOT_NAME}
    networks:
      - prepodavai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend-blue:
    <<: *frontend-defaults
    container_name: prepodavai-frontend-blue-prod

  frontend-green:
    <<: *frontend-defaults
    container_name: prepodavai-frontend-green-prod

  # NGINX Load Balancer
  nginx:
    image: nginx:alpine
    container_name: prepodavai-nginx-prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:3001:3001"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - prepodavai-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  uploads_data:


networks:
  prepodavai-network:
    driver: bridge
