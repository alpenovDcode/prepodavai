<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;500;600;700;800&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --accent:{{ACCENT}};
  --accent-light:{{ACCENT_LIGHT}};
  --accent-dark:{{ACCENT_DARK}};
  --bg:#FBFAF6; --surface:#FFFFFF;
  --text:#1A1A1A; --text-soft:#4A4A4A; --text-mute:#6F6F6F;
  --border:#D9D6CC; --border-soft:#EDE9DD;
  --paper:#F5F2E9;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Crimson Pro',Georgia,serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
.deck{position:relative;width:100vw;height:100vh}
.slide{position:absolute;inset:0;display:none;flex-direction:column;padding:64px 96px 100px;background:var(--surface);opacity:0;transition:opacity .25s ease}
.slide.active{display:flex;opacity:1}
.slide-num{position:absolute;top:36px;right:96px;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;letter-spacing:.18em;color:var(--text-mute);text-transform:uppercase}
.header-rule{position:absolute;top:36px;left:96px;width:64px;height:2px;background:var(--accent)}
.footer-rule{position:absolute;bottom:60px;left:96px;right:96px;height:1px;background:var(--border-soft)}
.footer-logo{position:absolute;bottom:24px;right:96px;width:32px;height:32px;opacity:.6;object-fit:contain}
.footer-meta{position:absolute;bottom:30px;left:96px;font-family:'Inter',sans-serif;font-size:11px;letter-spacing:.16em;color:var(--text-mute);text-transform:uppercase;font-weight:500}

h1,h2,h3{letter-spacing:-.005em;line-height:1.2;font-weight:700}
h1{font-size:62px;color:var(--text)}
h2{font-size:42px;color:var(--text);margin-bottom:28px;font-weight:700}
h3{font-size:24px;color:var(--text);margin-bottom:14px;font-weight:600;font-family:'Inter',sans-serif;letter-spacing:.01em}
p,li{font-size:22px;line-height:1.6;color:var(--text-soft)}

/* layout: title */
.layout-title{justify-content:center;align-items:flex-start;padding-left:96px}
.layout-title .eyebrow{font-family:'Inter',sans-serif;font-size:13px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:28px}
.layout-title h1{font-size:88px;font-weight:700;max-width:1100px;font-style:italic}
.layout-title .subtitle{font-size:30px;font-weight:400;color:var(--text-soft);margin-top:32px;max-width:900px;font-style:italic}
.layout-title .ornament{width:120px;height:2px;background:var(--accent);margin-top:36px}
.layout-title .meta{position:absolute;bottom:96px;left:96px;font-family:'Inter',sans-serif;color:var(--text-mute);font-size:13px;letter-spacing:.1em}

/* layout: bullets */
.layout-bullets ul{list-style:none;padding:0;display:flex;flex-direction:column;gap:14px;max-width:1100px}
.layout-bullets li{display:flex;gap:20px;align-items:baseline;font-size:23px;line-height:1.55;padding-left:0}
.layout-bullets li .num{flex-shrink:0;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--accent);letter-spacing:.05em;min-width:36px;padding-top:4px}

/* layout: two-column */
.layout-two-column .cols{display:grid;grid-template-columns:1fr 1px 1fr;gap:48px;max-width:1280px;margin-top:12px}
.layout-two-column .divider{background:var(--border)}
.layout-two-column .col h3{font-size:18px;color:var(--accent);margin-bottom:14px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;font-family:'Inter',sans-serif}
.layout-two-column .col p{font-size:20px;line-height:1.6}

/* layout: quote */
.layout-quote{justify-content:center;align-items:center;text-align:center;padding:96px}
.layout-quote .q{font-size:54px;font-weight:500;color:var(--text);line-height:1.3;max-width:1100px;font-style:italic}
.layout-quote .q::before{content:'\201C';display:block;font-size:120px;color:var(--accent);line-height:.5;margin-bottom:32px;font-style:normal}
.layout-quote .author{font-family:'Inter',sans-serif;font-size:18px;color:var(--text-mute);margin-top:40px;letter-spacing:.08em;text-transform:uppercase;font-weight:500;font-style:normal}

/* layout: summary */
.layout-summary{padding-top:64px}
.layout-summary h2{margin-bottom:36px}
.layout-summary .items{display:flex;flex-direction:column;gap:20px;max-width:1200px}
.layout-summary .item{display:flex;gap:32px;padding:24px 0;border-top:1px solid var(--border-soft)}
.layout-summary .item:last-child{border-bottom:1px solid var(--border-soft)}
.layout-summary .item .n{font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--accent);letter-spacing:.12em;min-width:48px;padding-top:6px}
.layout-summary .item .t{font-size:22px;color:var(--text);line-height:1.4;flex:1}

/* layout: content */
.layout-content{padding-top:64px}
.layout-content .body{max-width:1100px}
.layout-content .body p{margin-bottom:20px;font-size:23px;line-height:1.65;color:var(--text);text-align:justify;text-indent:32px}
.layout-content .body p:first-of-type{text-indent:0}
.layout-content .body p:first-of-type::first-letter{font-size:64px;font-weight:700;color:var(--accent);float:left;line-height:1;padding:6px 12px 0 0}

/* math */
mjx-container[display="true"]{margin:18px 0;font-size:1.1em!important}

/* nav */
.nav{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;z-index:50;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:0;padding:8px 14px;font-family:'Inter',sans-serif}
.nav button{width:34px;height:34px;border:none;background:transparent;cursor:pointer;color:var(--text-soft);font-size:18px;transition:color .15s}
.nav button:hover:not(:disabled){color:var(--accent)}
.nav button:disabled{opacity:.3;cursor:not-allowed}
.nav .counter{font-size:12px;font-weight:600;color:var(--text-soft);padding:0 8px;letter-spacing:.12em;min-width:60px;text-align:center}

@media print{.nav{display:none}.slide{display:flex!important;opacity:1!important;page-break-after:always}}
@media (max-width:900px){
  .slide{padding:40px 32px 90px}
  .header-rule,.footer-rule,.footer-meta,.slide-num,.footer-logo{left:32px;right:32px}
  .footer-logo{left:auto}.slide-num{left:auto}
  h1{font-size:42px}.layout-title h1{font-size:52px}
  h2{font-size:30px}p,li{font-size:18px}
  .layout-two-column .cols{grid-template-columns:1fr;gap:32px}
  .layout-two-column .divider{height:1px}
  .layout-quote{padding:32px}.layout-quote .q{font-size:30px}
}
</style>
</head>
<body>
<div class="deck" id="deck"></div>
<div class="nav" id="nav">
  <button id="prev">←</button>
  <span class="counter" id="counter">1 / 1</span>
  <button id="next">→</button>
</div>
<script>
window.PRESENTATION_DATA = {{DATA}};
const LOGO_URL = '{{LOGO_URL}}';
function esc(s){return String(s??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function renderMath(s){if(!s)return '';return String(s).replace(/\$\$([^$]+)\$\$/g,'\\[$1\\]').replace(/\$([^$\n]+)\$/g,'\\($1\\)');}
function renderSlide(s, idx, total){
  const num = `<div class="slide-num">${String(idx+1).padStart(2,'0')} / ${String(total).padStart(2,'0')}</div>`;
  const rule = '<div class="header-rule"></div>';
  const foot = `<div class="footer-rule"></div><div class="footer-meta">{{TOPIC}}</div>`;
  const logo = `<img class="footer-logo" src="${LOGO_URL}" alt="Преподавай">`;
  let body='';
  switch(s.layout){
    case 'title':
      body = `${s.eyebrow?`<div class="eyebrow">${esc(s.eyebrow)}</div>`:''}<h1>${esc(s.title)}</h1>${s.subtitle?`<div class="subtitle">${esc(s.subtitle)}</div>`:''}<div class="ornament"></div>${s.meta?`<div class="meta">${esc(s.meta)}</div>`:''}`;
      break;
    case 'bullets':
      body = `<h2>${esc(s.title)}</h2><ul>${(s.items||[]).map((i,k)=>`<li><span class="num">${String(k+1).padStart(2,'0')}</span><span>${renderMath(esc(i))}</span></li>`).join('')}</ul>`;
      break;
    case 'two-column':
      body = `<h2>${esc(s.title)}</h2><div class="cols"><div class="col"><h3>${esc(s.leftTitle||'')}</h3><p>${renderMath(esc(s.leftText||''))}</p></div><div class="divider"></div><div class="col"><h3>${esc(s.rightTitle||'')}</h3><p>${renderMath(esc(s.rightText||''))}</p></div></div>`;
      break;
    case 'quote':
      body = `<div class="q">${renderMath(esc(s.text||''))}</div>${s.author?`<div class="author">— ${esc(s.author)}</div>`:''}`;
      break;
    case 'summary':
      body = `<h2>${esc(s.title)}</h2><div class="items">${(s.items||[]).map((it,i)=>`<div class="item"><div class="n">${String(i+1).padStart(2,'0')}</div><div class="t">${renderMath(esc(it))}</div></div>`).join('')}</div>`;
      break;
    case 'content':
      body = `<h2>${esc(s.title)}</h2><div class="body">${(s.paragraphs||[]).map(p=>`<p>${renderMath(esc(p))}</p>`).join('')}</div>`;
      break;
    default:
      body = `<h2>${esc(s.title||s.layout)}</h2><p>${renderMath(esc(s.text||''))}</p>`;
  }
  return `<div class="slide layout-${s.layout}" data-idx="${idx}">${rule}${num}${body}${foot}${logo}</div>`;
}
let current=0;
const slides=PRESENTATION_DATA.slides||[];
const deck=document.getElementById('deck');
deck.innerHTML=slides.map((s,i)=>renderSlide(s,i,slides.length)).join('');
const slideEls=deck.querySelectorAll('.slide');
slideEls[0]?.classList.add('active');
function go(to){current=Math.max(0,Math.min(slides.length-1,to));slideEls.forEach((el,i)=>el.classList.toggle('active',i===current));document.getElementById('counter').textContent=`${current+1} / ${slides.length}`;document.getElementById('prev').disabled=current===0;document.getElementById('next').disabled=current===slides.length-1;if(window.MathJax?.typesetPromise)window.MathJax.typesetPromise([slideEls[current]]).catch(()=>{});}
document.getElementById('prev').onclick=()=>go(current-1);
document.getElementById('next').onclick=()=>go(current+1);
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){e.preventDefault();go(current+1);}if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();go(current-1);}if(e.key==='Home')go(0);if(e.key==='End')go(slides.length-1);});
go(0);
window.MathJax={loader:{load:['[tex]/mhchem']},tex:{inlineMath:[['\\(','\\)']],displayMath:[['\\[','\\]']],packages:{'[+]':['mhchem']}},options:{enableMenu:false}};
</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</body>
</html>
