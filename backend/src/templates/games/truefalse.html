<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Правда или Ложь - {{TOPIC}}</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --bg-color: #dfe6e9;
            --card-bg: #ffffff;
            --text-color: #2d3436;
            --true-color: #00b894;
            /* Green */
            --false-color: #d63031;
            /* Red */
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Верхняя панель */
        .header {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--primary);
        }

        .streak-container {
            background: #fff;
            padding: 5px 15px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* Карточка вопроса */
        .game-container {
            width: 90%;
            max-width: 500px;
            perspective: 1000px;
            position: relative;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-bottom: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s, background-color 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 300px;
            position: relative;
            z-index: 2;
        }

        .statement-text {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.3;
        }

        .explanation {
            font-size: 1.1rem;
            color: #636e72;
            margin-top: 20px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
            display: none;
            background: rgba(0, 0, 0, 0.05);
            padding: 15px;
            border-radius: 10px;
        }

        .explanation.visible {
            opacity: 1;
            transform: translateY(0);
            display: block;
        }

        /* Кнопки управления */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            width: 100%;
        }

        .btn {
            border: none;
            outline: none;
            padding: 20px;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: scale(0.9);
        }

        .btn-true {
            background-color: var(--true-color);
        }

        .btn-false {
            background-color: var(--false-color);
        }

        .btn-next {
            background-color: var(--primary);
            border-radius: 50px;
            width: auto;
            padding: 15px 40px;
            font-size: 1.2rem;
            display: none;
            /* Скрыта по умолчанию */
        }

        /* Состояния ответа */
        .card.correct-answer {
            border: 4px solid var(--true-color);
        }

        .card.wrong-answer {
            border: 4px solid var(--false-color);
        }

        /* Экран результатов */
        .result-screen {
            display: none;
            text-align: center;
        }

        .result-screen h2 {
            font-size: 2.5rem;
            color: var(--primary);
        }

        .score-big {
            font-size: 4rem;
            font-weight: bold;
            color: var(--text-color);
            margin: 20px 0;
        }

        /* Анимация иконок */
        .feedback-icon {
            font-size: 4rem;
            position: absolute;
            top: -30px;
            opacity: 0;
            transition: 0.3s;
        }

        .feedback-icon.show {
            top: -60px;
            opacity: 1;
        }
    </style>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body>

    <div class="header">
        <div id="progress">Вопрос 1/15</div>
        <div class="streak-container">🔥 Серия: <span id="streak">0</span></div>
    </div>

    <div class="game-container" id="game-screen">
        <div class="card" id="card">
            <div class="feedback-icon" id="feedback-icon"></div>
            <div class="statement-text" id="statement">Загрузка...</div>
            <div class="explanation" id="explanation"></div>
        </div>

        <div class="controls" id="answer-controls">
            <button class="btn btn-false" onclick="handleAnswer(false)">ЛОЖЬ</button>
            <button class="btn btn-true" onclick="handleAnswer(true)">ПРАВДА</button>
        </div>

        <div class="controls" style="justify-content: center;">
            <button class="btn btn-next" id="next-btn" onclick="nextQuestion()">Далее ➜</button>
        </div>
    </div>

    <div class="result-screen" id="result-screen">
        <h2>Игра окончена!</h2>
        <p>Ваш итоговый счет:</p>
        <div class="score-big"><span id="final-score">0</span> / <span id="final-total">0</span></div>
        <p id="final-message"></p>
        <button class="btn btn-next" style="display: inline-block;" onclick="location.reload()">Играть снова</button>
    </div>

    <script>
        // --- ДАННЫЕ (JSON) ---
        const GAME_CONFIG = {{ GAME_DATA }};
        const GAME_DATA = GAME_CONFIG.data;
        const GAME_TOPIC = GAME_CONFIG.topic;

        // --- ЛОГИКА ИГРЫ ---

        let currentIndex = 0;
        let score = 0;
        let streak = 0;

        const cardElement = document.getElementById('card');
        const statementElement = document.getElementById('statement');
        const explanationElement = document.getElementById('explanation');
        const feedbackIcon = document.getElementById('feedback-icon');
        const answerControls = document.getElementById('answer-controls');
        const nextBtn = document.getElementById('next-btn');
        const progressEl = document.getElementById('progress');
        const streakEl = document.getElementById('streak');

        function initGame() {
            loadQuestion();
        }

        function loadQuestion() {
            // Сброс стилей
            cardElement.className = 'card';
            explanationElement.classList.remove('visible');
            feedbackIcon.classList.remove('show');
            answerControls.style.display = 'flex';
            nextBtn.style.display = 'none';

            // Данные
            const data = GAME_DATA[currentIndex];
            statementElement.innerText = data.statement;
            explanationElement.innerText = data.explanation;

            progressEl.innerText = `Вопрос ${currentIndex + 1}/${GAME_DATA.length}`;

            // Trigger MathJax
            if (window.MathJax) {
                MathJax.typesetPromise && MathJax.typesetPromise();
            }
        }

        function handleAnswer(userChoice) {
            const data = GAME_DATA[currentIndex];
            const isCorrect = userChoice === data.isTrue;

            // Блокируем кнопки
            answerControls.style.display = 'none';
            nextBtn.style.display = 'inline-block';

            // Показываем результат
            if (isCorrect) {
                score++;
                streak++;
                cardElement.classList.add('correct-answer');
                feedbackIcon.innerText = '✅';
                feedbackIcon.style.color = 'var(--true-color)';
            } else {
                streak = 0;
                cardElement.classList.add('wrong-answer');
                feedbackIcon.innerText = '❌';
                feedbackIcon.style.color = 'var(--false-color)';
            }

            streakEl.innerText = streak;
            feedbackIcon.classList.add('show');

            // Показываем объяснение
            explanationElement.classList.add('visible');
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < GAME_DATA.length) {
                loadQuestion();
            } else {
                endGame();
            }
        }

        function endGame() {
            document.getElementById('game-screen').style.display = 'none';
            document.querySelector('.header').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('final-score').innerText = score;
            // Знаменатель — реальное число вопросов, а не жёстко зашитое 15.
            // Иначе при 5 заданиях счёт показывается «5/15».
            const total = GAME_DATA.length;
            document.getElementById('final-total').innerText = total;

            const msg = document.getElementById('final-message');
            const ratio = total > 0 ? score / total : 0;
            if (ratio === 1) msg.innerText = "Невероятно! Вы настоящий эксперт!";
            else if (ratio >= 0.7) msg.innerText = "Отличный результат!";
            else if (ratio >= 0.4) msg.innerText = "Неплохо, но есть куда расти.";
            else msg.innerText = "Попробуйте еще раз!";
        }

        // Запуск
        initGame();

    </script>
</body>

</html>
