# ============================================================
# Optimized Nginx Configuration for PrepodavAI
# ============================================================
#
# ОПТИМИЗАЦИИ:
# 1. Gzip сжатие (уменьшает размер передаваемых данных).
# 2. Кеширование статики Next.js (ускоряет загрузку страниц).
# 3. Увеличенные тайм-ауты (важно для долгих AI генераций).
# 4. Настройки безопасности (скрытие версии Nginx).
#
# ИНСТРУКЦИЯ:
# 1. Замените 'yourdomain.com' на ваш реальный домен.
# 2. Скопируйте: sudo cp nginx.prod.conf /etc/nginx/sites-available/prepodavai
# 3. Перезагрузите: sudo systemctl reload nginx
# ============================================================

# Глобальные настройки оптимизации (можно вынести в nginx.conf, но здесь тоже работают)
proxy_http_version 1.1;
proxy_cache_bypass $http_upgrade;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection 'upgrade';
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;

# ------------------------------------------------------------
# 1. FRONTEND (Next.js)
# Домен: yourdomain.com
# ------------------------------------------------------------
server {
    listen 80;
    server_name prepodavai.ru www.prepodavai.ru;

    # Логи
    access_log /var/log/nginx/prepodavai_front_access.log;
    error_log /var/log/nginx/prepodavai_front_error.log;

    # Gzip сжатие
    gzip on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/css application/javascript image/svg+xml;

    # Безопасность
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Кеширование статики Next.js (самое важное для скорости!)
    location /_next/static {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_bypass $http_upgrade;
        
        # Кешируем навсегда (Next.js использует хеши в именах файлов)
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /static {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Основное приложение
    location / {
        proxy_pass http://127.0.0.1:3000;
    }
}

# ------------------------------------------------------------
# 2. BACKEND API (NestJS)
# Домен: api.yourdomain.com
# ------------------------------------------------------------
server {
    listen 80;
    server_name api.prepodavai.ru;

    # Логи
    access_log /var/log/nginx/prepodavai_api_access.log;
    error_log /var/log/nginx/prepodavai_api_error.log;

    # Увеличиваем размер тела запроса (для загрузки файлов)
    client_max_body_size 2G;

    # Увеличиваем тайм-ауты (КРИТИЧНО для AI генераций)
    # Если генерация идет дольше 60 сек, Nginx по умолчанию разорвет соединение.
    # Ставим 5 минут (300 сек) для надежности.
    proxy_connect_timeout 300;
    proxy_send_timeout 300;
    proxy_read_timeout 300;
    send_timeout 300;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://127.0.0.1:3001;
    }
}

server {
    listen 80;
    server_name content.prepodavai.ru;

    location /api/games/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Authorization "";
        proxy_set_header Cookie "";
        add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' data: https:;";
        add_header X-Content-Type-Options "nosniff";
    }

    location / {
        return 404;
    }
}